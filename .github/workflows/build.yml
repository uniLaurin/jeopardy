name: Build Executables

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: Jeopardy-macOS
          - os: windows-latest
            artifact_name: Jeopardy-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller jeopardy.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: Jeopardy-macOS
          path: macos-build/

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: Jeopardy-Windows
          path: windows-build/

      - name: Zip builds
        run: |
          cd macos-build && zip -r ../Jeopardy-macOS.zip . && cd ..
          cd windows-build && zip -r ../Jeopardy-Windows.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Jeopardy-macOS.zip
            Jeopardy-Windows.zip
          generate_release_notes: true
